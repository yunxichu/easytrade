<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A股市场信息</title>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
  <style>
    :root {
      --bg: #0b0f1a; --surface: #111827; --surface2: #1a2235;
      --border: #1e2d45; --accent: #3b82f6; --up: #ef4444; --down: #22c55e;
      --text: #e2e8f0; --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','PingFang SC',sans-serif; min-height: 100vh; }

    .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:56px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    .topbar-logo { display:flex; align-items:center; gap:10px; font-size:1.1rem; font-weight:700; color:var(--accent); }
    .topbar-logo .dot { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    .topbar-nav a { padding:5px 14px; border-radius:6px; font-size:.85rem; color:var(--muted); text-decoration:none; transition:all .2s; }
    .topbar-nav a:hover,.topbar-nav a.active { color:var(--accent); background:rgba(59,130,246,.12); }

    .main { max-width:1600px; margin:0 auto; padding:24px 20px; }
    .page-header { margin-bottom:20px; }
    .page-header h1 { font-size:1.6rem; font-weight:700; }
    .page-header p { color:var(--muted); font-size:.88rem; margin-top:4px; }

    /* 搜索栏 */
    .search-bar { display:flex; gap:10px; margin-bottom:20px; }
    .search-bar input { flex:1; max-width:320px; padding:8px 14px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:.9rem; }
    .search-bar input:focus { outline:none; border-color:var(--accent); }
    .search-bar button { padding:8px 18px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:.88rem; }
    .search-bar button:hover { background:#2563eb; }

    /* 指数卡片 */
    .index-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:14px; margin-bottom:22px; }
    .index-card { padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:12px; cursor:default; transition:border-color .2s; }
    .index-card:hover { border-color:var(--accent); }
    .idx-name { font-size:.78rem; color:var(--muted); margin-bottom:4px; }
    .idx-price { font-size:1.35rem; font-weight:700; }
    .idx-change { font-size:.82rem; margin-top:2px; }
    .up-text { color:var(--up); } .down-text { color:var(--down); }

    /* 宽度统计 */
    .breadth-bar { display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; flex-wrap:wrap; }
    .breadth-item { display:flex; align-items:center; gap:6px; font-size:.85rem; }
    .brd-dot { width:10px; height:10px; border-radius:50%; }
    .breadth-progress { flex:1; min-width:200px; height:10px; background:var(--border); border-radius:5px; overflow:hidden; display:flex; }
    .brd-seg { height:100%; transition:width .5s; }

    /* 主内容网格 */
    .content-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
    .chart-card h3 { font-size:.93rem; font-weight:600; margin-bottom:10px; }
    .chart-inner { width:100%; height:300px; }

    /* 股票列表 */
    .stock-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:20px; }
    .tab-header { display:flex; gap:0; border-bottom:1px solid var(--border); }
    .tab-btn { padding:10px 20px; font-size:.85rem; cursor:pointer; border:none; background:transparent; color:var(--muted); border-bottom:2px solid transparent; transition:all .2s; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(59,130,246,.05); }
    table { width:100%; border-collapse:collapse; font-size:.84rem; }
    thead th { padding:9px 12px; text-align:left; font-size:.74rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); background:var(--surface); white-space:nowrap; }
    tbody td { padding:9px 12px; border-bottom:1px solid rgba(30,45,69,.4); }
    tbody tr:hover td { background:rgba(59,130,246,.04); cursor:pointer; }

    /* K线弹窗 */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:min(800px,95vw); padding:24px; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .modal-close { width:30px; height:30px; border-radius:50%; border:none; background:var(--surface2); color:var(--muted); cursor:pointer; font-size:1.1rem; }
    .modal-close:hover { color:var(--text); }

    .loading-overlay { position:fixed; inset:0; background:rgba(11,15,26,.7); display:none; align-items:center; justify-content:center; z-index:9999; }
    .loading-overlay.show { display:flex; }
    .spinner { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:900px) { .content-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-logo"><div class="dot"></div>QuantLab</div>
  <div class="topbar-nav" style="display:flex;gap:6px">
    <a href="/">外盘商品</a>
    <a href="/stock" class="active">股票市场</a>
    <a href="/cross-section">截面多空</a>
    <a href="/quant">量化全流程</a>
  </div>
  <div id="last-update" style="font-size:.8rem;color:var(--muted)">—</div>
</nav>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<!-- K线弹窗 -->
<div class="modal-overlay" id="kline-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">K线图</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-chart" style="height:380px"></div>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <h1>📊 A股市场信息</h1>
    <p>实时行情 · AKShare数据源 · 含反爬延迟保护机制</p>
  </div>

  <!-- 搜索 -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="搜索股票名称或代码..." onkeyup="if(event.key==='Enter')searchStock()" />
    <button onclick="searchStock()">🔍 搜索</button>
    <button onclick="loadAll()" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)">刷新全部</button>
  </div>

  <!-- 大盘指数 -->
  <div class="index-row" id="index-row">
    <div class="index-card"><div class="idx-name">加载中...</div></div>
  </div>

  <!-- 宽度指标 -->
  <div class="breadth-bar" id="breadth-bar">
    <span style="font-size:.82rem;color:var(--muted)">市场宽度加载中...</span>
  </div>

  <!-- 图表区 -->
  <div class="content-grid">
    <div class="chart-card">
      <h3>🏭 行业板块涨跌幅 TOP10</h3>
      <div id="chart-sector" class="chart-inner"></div>
    </div>
    <div class="chart-card">
      <h3>🌡️ 市场温度计（涨跌分布）</h3>
      <div id="chart-breadth" class="chart-inner"></div>
    </div>
  </div>

  <!-- 股票列表 -->
  <div class="stock-table-wrap">
    <div class="tab-header">
      <button class="tab-btn active" onclick="switchTab('all', this)">全部行情</button>
      <button class="tab-btn" onclick="switchTab('gainers', this)">涨幅榜</button>
      <button class="tab-btn" onclick="switchTab('losers', this)">跌幅榜</button>
      <button class="tab-btn" onclick="switchTab('volume', this)">成交额榜</button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th><th>代码</th><th>名称</th><th>最新价</th>
            <th>涨跌额</th><th>涨跌幅</th><th>成交量(万)</th>
            <th>成交额(亿)</th><th>PE(TTM)</th><th>市净率</th>
            <th>总市值(亿)</th><th>行业</th>
          </tr>
        </thead>
        <tbody id="stock-tbody">
          <tr><td colspan="12" style="text-align:center;color:var(--muted);padding:30px">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const THEME = {
  bg:'#111827', paper:'#111827', text:'#e2e8f0', grid:'#1e2d45', muted:'#64748b',
  up:'#ef4444', down:'#22c55e', blue:'#3b82f6'
};
const BASE_LAYOUT = {
  paper_bgcolor: THEME.paper, plot_bgcolor: THEME.bg,
  font: { color: THEME.text, family: "'Segoe UI','PingFang SC',sans-serif", size: 11 },
  margin: { t: 10, l: 50, r: 20, b: 40 },
  xaxis: { gridcolor: THEME.grid }, yaxis: { gridcolor: THEME.grid }
};

function loading(show) { document.getElementById('loading').classList.toggle('show', show); }

async function fetchJSON(url) {
  const res = await fetch(url);
  return res.json();
}

/* ──── 大盘指数 ──── */
async function loadIndices() {
  try {
    const json = await fetchJSON('/api/stock/market/overview');
    if (!json.success) return;
    const row = document.getElementById('index-row');
    row.innerHTML = json.data.map(idx => {
      const up = idx.change_pct >= 0;
      const cls = up ? 'up-text' : 'down-text';
      const sign = up ? '+' : '';
      return `<div class="index-card">
        <div class="idx-name">${idx.name}</div>
        <div class="idx-price ${cls}">${idx.price.toLocaleString()}</div>
        <div class="idx-change ${cls}">${sign}${idx.change} (${sign}${idx.change_pct}%)</div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

/* ──── 市场宽度 ──── */
async function loadBreadth() {
  try {
    const json = await fetchJSON('/api/stock/breadth');
    if (!json.success) return;
    const d = json.data;
    const total = d.up + d.down + d.flat;
    const upW = (d.up / total * 100).toFixed(1);
    const dnW = (d.down / total * 100).toFixed(1);
    const flW = (d.flat / total * 100).toFixed(1);
    document.getElementById('breadth-bar').innerHTML = `
      <div class="breadth-item"><div class="brd-dot" style="background:var(--up)"></div>上涨 <b style="color:var(--up)">${d.up}</b></div>
      <div class="breadth-item"><div class="brd-dot" style="background:var(--down)"></div>下跌 <b style="color:var(--down)">${d.down}</b></div>
      <div class="breadth-item"><div class="brd-dot" style="background:var(--muted)"></div>平盘 <b>${d.flat}</b></div>
      <div class="breadth-item"><div class="brd-dot" style="background:#fbbf24"></div>涨停 <b style="color:#fbbf24">${d.limit_up}</b></div>
      <div class="breadth-item"><div class="brd-dot" style="background:#a78bfa"></div>跌停 <b style="color:#a78bfa">${d.limit_down}</b></div>
      <div class="breadth-progress">
        <div class="brd-seg" style="width:${upW}%;background:var(--up)"></div>
        <div class="brd-seg" style="width:${flW}%;background:var(--muted)"></div>
        <div class="brd-seg" style="width:${dnW}%;background:var(--down)"></div>
      </div>
      <span style="font-size:.78rem;color:var(--muted)">${d.source === 'akshare' ? '🟢 实时' : '🟡 模拟'}</span>
    `;

    // 饼图
    Plotly.react('chart-breadth', [{
      labels:['上涨','下跌','平盘'],
      values:[d.up, d.down, d.flat],
      type:'pie', hole:0.45,
      marker:{colors:[THEME.up, THEME.down, THEME.muted]},
      textinfo:'label+percent', textfont:{color:THEME.text},
    }], { ...BASE_LAYOUT, margin:{t:10,l:20,r:20,b:10}, showlegend:false },
    { responsive:true, displayModeBar:false });
  } catch(e) { console.error(e); }
}

/* ──── 行业板块 ──── */
async function loadSectors() {
  try {
    const json = await fetchJSON('/api/stock/sectors');
    if (!json.success) return;
    const sectors = json.data.slice(0, 10);
    const names = sectors.map(s => s.name);
    const vals = sectors.map(s => s.change_pct);
    const colors = vals.map(v => v >= 0 ? THEME.up : THEME.down);
    Plotly.react('chart-sector', [{
      y: names, x: vals, type:'bar', orientation:'h',
      marker:{color:colors},
      text: vals.map(v => `${v>0?'+':''}${v}%`), textposition:'outside',
      textfont:{color:THEME.text},
    }], {
      ...BASE_LAYOUT,
      margin:{t:10,l:90,r:60,b:30},
      xaxis:{...BASE_LAYOUT.xaxis, tickformat:'.1f', ticksuffix:'%'},
      yaxis:{...BASE_LAYOUT.yaxis, autorange:'reversed'},
    }, { responsive:true, displayModeBar:false });
  } catch(e) { console.error(e); }
}

/* ──── 股票列表 ──── */
async function loadStockTable(endpoint='/api/stock/list') {
  try {
    const json = await fetchJSON(endpoint);
    if (!json.success) return;
    renderStockTable(json.data);
  } catch(e) { console.error(e); }
}

function renderStockTable(stocks) {
  const tbody = document.getElementById('stock-tbody');
  if (!stocks || stocks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--muted);padding:30px">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = stocks.map((s, i) => {
    const up = s.change_pct >= 0;
    const cls = up ? 'up-text' : 'down-text';
    const sign = up ? '+' : '';
    const src = s.source === 'akshare' ? '' : '<sup style="color:var(--muted);font-size:.65rem">模</sup>';
    return `<tr onclick="showKline('${s.code}', '${s.name}')">
      <td style="color:var(--muted)">${i+1}</td>
      <td style="font-family:monospace;color:var(--muted)">${s.code}</td>
      <td style="font-weight:600">${s.name}${src}</td>
      <td class="${cls}" style="font-weight:700">${s.price}</td>
      <td class="${cls}">${sign}${s.change}</td>
      <td class="${cls}">${sign}${s.change_pct}%</td>
      <td>${(s.volume/10000).toFixed(0)}</td>
      <td>${s.turnover}</td>
      <td style="color:var(--muted)">${s.pe_ttm > 0 ? s.pe_ttm : '—'}</td>
      <td style="color:var(--muted)">${s.pb > 0 ? s.pb : '—'}</td>
      <td style="color:var(--muted)">${s.market_cap > 0 ? s.market_cap.toFixed(0) : '—'}</td>
      <td style="color:var(--muted)">${s.industry || '—'}</td>
    </tr>`;
  }).join('');
}

async function searchStock() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { loadStockTable(); return; }
  loading(true);
  try {
    const json = await fetchJSON(`/api/stock/list?q=${encodeURIComponent(q)}`);
    if (json.success) renderStockTable(json.data);
  } finally { loading(false); }
}

async function switchTab(type, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loading(true);
  try {
    const endpoints = { all:'/api/stock/list', gainers:'/api/stock/top-gainers', losers:'/api/stock/top-losers', volume:'/api/stock/top-volume' };
    const json = await fetchJSON(endpoints[type] || '/api/stock/list');
    if (json.success) renderStockTable(json.data);
  } finally { loading(false); }
}

/* ──── K线弹窗 ──── */
async function showKline(code, name) {
  document.getElementById('modal-title').textContent = `${name} (${code}) K线图`;
  document.getElementById('kline-modal').classList.add('show');
  try {
    const json = await fetchJSON(`/api/stock/kline/${code}?period=daily`);
    if (!json.success) return;
    const d = json.data;
    Plotly.react('modal-chart', [{
      x: d.map(r => r.date),
      open: d.map(r => r.open), high: d.map(r => r.high),
      low: d.map(r => r.low), close: d.map(r => r.close),
      type: 'candlestick',
      increasing: { line: { color: THEME.up }, fillcolor: THEME.up },
      decreasing: { line: { color: THEME.down }, fillcolor: THEME.down },
    }], {
      ...BASE_LAYOUT,
      xaxis: { ...BASE_LAYOUT.xaxis, rangeslider: { visible: false } },
      margin: { t: 10, l: 60, r: 20, b: 40 },
    }, { responsive: true, displayModeBar: false });
  } catch(e) { console.error(e); }
}

function closeModal() {
  document.getElementById('kline-modal').classList.remove('show');
}
document.getElementById('kline-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('kline-modal')) closeModal();
});

/* ──── 初始化 ──── */
async function loadAll() {
  loading(true);
  try {
    await Promise.all([loadIndices(), loadBreadth(), loadSectors()]);
    await loadStockTable();
    document.getElementById('last-update').textContent = '更新于 ' + new Date().toLocaleTimeString();
  } finally { loading(false); }
}

window.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
